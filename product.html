<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - إلكتروهومسي</title>
    <meta name="description" content="تفاصيل المنتج - إلكتروهومسي ElectroHomeSY | أجهزة منزلية وإلكترونية في دمشق">

    <!-- Official Brand Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.svg">

    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Brand Stylesheet -->
    <link rel="stylesheet" href="/css/style.css?v=1.3.0">

    <style>
        .product-page-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--damascus-green);
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            margin-bottom: 28px;
            padding: 8px 16px;
            border: 1.5px solid var(--damascus-green);
            border-radius: 30px;
            transition: all 0.25s;
        }
        .back-btn:hover {
            background: var(--damascus-green);
            color: white;
        }
        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        .product-main-img {
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 16px 50px rgba(7,48,102,0.14);
            object-fit: cover;
            aspect-ratio: 1/1;
        }
        .product-code-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0f4ff;
            color: var(--damascus-green);
            border: 1.5px solid rgba(7,48,102,0.18);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 800;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .product-code-badge:hover { background: var(--damascus-green); color: white; }
        .product-title-main {
            font-size: 2rem;
            font-weight: 900;
            color: var(--onyx);
            margin-bottom: 12px;
            line-height: 1.35;
        }
        .product-category-pill {
            display: inline-block;
            background: rgba(0,180,216,0.12);
            color: var(--volt-mint);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .product-price-main {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--damascus-green);
            margin-bottom: 6px;
        }
        .product-price-old {
            font-size: 1.1rem;
            color: var(--steel-grey);
            text-decoration: line-through;
            margin-bottom: 18px;
        }
        .product-desc {
            color: var(--steel-grey);
            line-height: 1.85;
            font-size: 1.02rem;
            margin-bottom: 24px;
        }
        .youtube-embed-box {
            margin-top: 20px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .youtube-embed-box iframe {
            width: 100%;
            height: 240px;
            border: none;
            display: block;
        }
        .variant-selector-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 22px;
        }
        .variant-title { font-weight: 800; color: var(--onyx); margin-bottom: 12px; font-size: 0.95rem; }
        .variant-options { display: flex; flex-direction: column; gap: 10px; }
        .variant-opt-btn {
            background: white;
            border: 1.5px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            text-align: right;
            font-family: 'Cairo', sans-serif;
            font-size: 0.92rem;
            color: var(--onyx);
            transition: all 0.2s;
        }
        .variant-opt-btn.selected,
        .variant-opt-btn:hover {
            border-color: var(--damascus-green);
            background: rgba(7,48,102,0.06);
            color: var(--damascus-green);
        }
        .product-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        .btn-add-cart-full {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--damascus-green);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 30px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.08rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(7,48,102,0.3);
            text-decoration: none;
        }
        .btn-add-cart-full:hover {
            background: var(--damascus-green-dark);
            transform: translateY(-2px);
        }
        .btn-whatsapp-full {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(37,211,102,0.3);
        }
        .btn-whatsapp-full:hover { background: #1ebe59; transform: translateY(-2px); }
        .share-link-box {
            background: #f8fafc;
            border: 1.5px dashed var(--border-color);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
        }
        .share-link-text {
            font-size: 0.82rem;
            color: var(--steel-grey);
            word-break: break-all;
            flex: 1;
        }
        .copy-link-btn {
            background: var(--damascus-green);
            color: white;
            border: none;
            padding: 7px 14px;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .copy-link-btn:hover { background: var(--damascus-green-dark); }
        .loading-placeholder {
            text-align: center;
            padding: 80px 20px;
            color: var(--steel-grey);
        }
        .loading-placeholder i { font-size: 3rem; margin-bottom: 16px; display: block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .product-detail-grid { grid-template-columns: 1fr; }
            .product-title-main { font-size: 1.5rem; }
            .product-price-main { font-size: 1.8rem; }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="nav-wrapper">
                <a href="/" class="brand-logo">
                    <img src="/Logo/ElectroHomeSY-logo-blue.png" alt="إلكتروهومسي" class="main-logo-img">
                </a>
                <div style="flex:1;"></div>
                <div class="nav-actions">
                    <a href="/" class="nav-btn">
                        <i class="fa-solid fa-store"></i>
                        <span>المتجر</span>
                    </a>
                    <button class="nav-btn nav-btn-cart" id="btnOpenCart" onclick="renderCartModal()">
                        <i class="fa-solid fa-basket-shopping"></i>
                        <span>السلة</span>
                        <span class="cart-badge" id="cartCount">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Product Detail Content -->
    <main class="product-page-wrapper">
        <a href="/" class="back-btn">
            <i class="fa-solid fa-arrow-right"></i>
            العودة إلى المتجر
        </a>

        <div id="productPageContent">
            <div class="loading-placeholder">
                <i class="fa-solid fa-spinner"></i>
                <p>جاري تحميل تفاصيل المنتج...</p>
            </div>
        </div>
    </main>

    <!-- Cart Modal (same as index) -->
    <div class="modal-overlay" id="cartModal">
        <div class="modal-card" style="max-width: 560px;">
            <button class="close-modal-btn" onclick="closeModal('cartModal')"><i class="fa-solid fa-xmark"></i></button>
            <h3 style="font-size:1.5rem; font-weight:900; margin-bottom:20px; text-align:center;">
                <i class="fa-solid fa-basket-shopping" style="color:var(--damascus-green); margin-left:8px;"></i> سلة التسوق
            </h3>
            <div id="cartItemsList"></div>
            <div style="border-top:1px solid var(--border-color); padding-top:16px; margin-top:16px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:800; font-size:1.1rem;">الإجمالي:</span>
                <span id="cartTotalPrice" style="font-size:1.5rem; font-weight:900; color:var(--damascus-green);"></span>
            </div>
            <a href="/" style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:16px; background:var(--damascus-green); color:white; padding:14px 20px; border-radius:30px; font-family:'Cairo',sans-serif; font-size:1rem; font-weight:800; text-decoration:none;">
                <i class="fa-solid fa-store"></i> إتمام الطلب من المتجر
            </a>
        </div>
    </div>

    <!-- App JS -->
    <script src="/js/app.js?v=1.4.0"></script>
    <script>
        // ===========================
        // Product Page Logic
        // ===========================
        let pageProduct = null;
        let pageVariant = null;

        function generateProductCode(id) {
            return 'EHS-' + String(id).padStart(3, '0');
        }

        function getProductIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id')) || null;
        }

        async function loadProductPage() {
            const productId = getProductIdFromUrl();
            if (!productId) {
                document.getElementById('productPageContent').innerHTML = `
                    <div style="text-align:center; padding:80px 20px; color:var(--steel-grey);">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:3rem; color:#f59e0b; margin-bottom:16px; display:block;"></i>
                        <p style="font-size:1.1rem;">لم يتم تحديد منتج. <a href="/" style="color:var(--damascus-green); font-weight:700;">العودة للمتجر</a></p>
                    </div>`;
                return;
            }

            // Try API first, fallback to static data
            try {
                const res = await fetch(`/api/products/${productId}`);
                if (!res.ok) throw new Error();
                pageProduct = await res.json();
            } catch (e) {
                try {
                    pageProduct = await fetchProductDetailsFromGoogleSheetsClient(productId);
                } catch (sheetErr) {
                    console.error('Client Google Sheets details fallback failed:', sheetErr);
                    pageProduct = FALLBACK_PRODUCTS.find(p => p.id === productId) || null;
                }
            }

            if (!pageProduct) {
                document.getElementById('productPageContent').innerHTML = `
                    <div style="text-align:center; padding:80px 20px; color:var(--steel-grey);">
                        <i class="fa-solid fa-box-open" style="font-size:3rem; margin-bottom:16px; display:block;"></i>
                        <p style="font-size:1.1rem;">المنتج غير موجود. <a href="/" style="color:var(--damascus-green); font-weight:700;">العودة للمتجر</a></p>
                    </div>`;
                return;
            }

            // Set page title
            document.title = `${pageProduct.title_ar} - إلكتروهومسي`;

            pageVariant = pageProduct.variants && pageProduct.variants.length > 0 ? pageProduct.variants[0] : null;
            renderProductPage();
            updateCartBadge();
            
            // Populate obfuscated contact info
            const p1 = '963';
            const p2 = '959';
            const p3 = '930';
            const p4 = '005';
            const formattedPhone = `+${p1} ${p2} ${p3} ${p4}`;
            const waDisplay = document.getElementById('whatsapp-number-display');
            if (waDisplay) {
                waDisplay.textContent = formattedPhone;
            }
        }

        function renderProductPage() {
            const p = pageProduct;
            const productCode = generateProductCode(p.id);
            const pageUrl = window.location.href;
            const basePrice = p.discount_price ? p.discount_price : p.base_price;
            const priceModifier = pageVariant ? pageVariant.price_modifier : 0;
            const finalPrice = basePrice + priceModifier;
            const hasDiscount = p.discount_price && p.discount_price < p.base_price;
            const p1 = '963';
            const p2 = '959';
            const p3 = '930';
            const p4 = '005';
            const formattedPhone = `+${p1} ${p2} ${p3} ${p4}`;
            const waLink = getWhatsAppInquiryLink(p.title_ar, p.id);
            const youtubeEmbed = getYouTubeEmbedUrl(p.youtube_url);

            document.getElementById('productPageContent').innerHTML = `
                <div class="product-detail-grid">
                    <!-- LEFT: Image + Video -->
                    <div>
                        <img src="${p.main_image || 'https://images.unsplash.com/photo-1584269600464-37b1b58a9fe7?auto=format&fit=crop&w=800&q=80'}"
                             alt="${p.title_ar}" class="product-main-img">
                        ${youtubeEmbed ? `
                            <div class="youtube-embed-box" style="margin-top:20px;">
                                <iframe src="${youtubeEmbed}" title="معاينة الجهاز" allowfullscreen></iframe>
                            </div>` : ''}
                    </div>

                    <!-- RIGHT: Info -->
                    <div>
                        <div class="product-code-badge" onclick="copyProductLink('${pageUrl}')" title="انقر لنسخ الرابط">
                            <i class="fa-solid fa-barcode"></i>
                            رمز المنتج: ${productCode}
                            <i class="fa-solid fa-copy" style="font-size:0.8rem; opacity:0.7;"></i>
                        </div>

                        <span class="product-category-pill">${p.category_name || 'أجهزة منزلية'}</span>
                        <h1 class="product-title-main">${p.title_ar}</h1>

                        <div class="product-price-main" id="pageFinalPrice">${formatSYP(finalPrice)}</div>
                        ${hasDiscount ? `<div class="product-price-old">${formatSYP(p.base_price)}</div>` : ''}

                        <p class="product-desc">${p.description_ar || ''}</p>

                        ${p.variants && p.variants.length > 0 ? `
                            <div class="variant-selector-box">
                                <div class="variant-title">اختر الماركة والموديل والمواصفات:</div>
                                <div class="variant-options" id="variantOptions">
                                    ${p.variants.map(v => {
                                        const isSelected = pageVariant && pageVariant.id === v.id;
                                        const attrs = Object.entries(v.variant_attributes || {}).map(([k, val]) => `${k}: ${val}`).join(' | ');
                                        return `<button class="variant-opt-btn ${isSelected ? 'selected' : ''}" onclick="selectPageVariant(${v.id})">
                                            <strong>${v.brand} ${v.model_name}</strong> ${attrs ? `(${attrs})` : ''}
                                        </button>`;
                                    }).join('')}
                                </div>
                            </div>` : ''}

                        <div class="product-actions">
                            <button class="btn-add-cart-full" onclick="addPageProductToCart()">
                                <i class="fa-solid fa-cart-plus"></i> إضافة إلى السلة وإتمام الشراء
                            </button>
                            <a href="${waLink}" target="_blank" class="btn-whatsapp-full">
                                <span><i class="fa-brands fa-whatsapp"></i> واتساب المبيعات: <span dir="ltr" style="font-weight:700;">${formattedPhone}</span></span>
                                استفسار مباشر عبر الواتساب
                            </a>
                        </div>

                        <!-- Share Link -->
                        <div class="share-link-box" style="margin-top:20px;">
                            <i class="fa-solid fa-link" style="color:var(--damascus-green); font-size:1rem; flex-shrink:0;"></i>
                            <span class="share-link-text">${pageUrl}</span>
                            <button class="copy-link-btn" onclick="copyProductLink('${pageUrl}')">
                                <i class="fa-solid fa-copy"></i> نسخ
                            </button>
                        </div>
                    </div>
                </div>`;
        }

        function selectPageVariant(variantId) {
            pageVariant = pageProduct.variants.find(v => v.id === variantId);
            const basePrice = pageProduct.discount_price ? pageProduct.discount_price : pageProduct.base_price;
            const priceModifier = pageVariant ? pageVariant.price_modifier : 0;
            document.getElementById('pageFinalPrice').innerText = formatSYP(basePrice + priceModifier);
            document.querySelectorAll('.variant-opt-btn').forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function addPageProductToCart() {
            if (!pageProduct) return;
            const basePrice = pageProduct.discount_price ? pageProduct.discount_price : pageProduct.base_price;
            const priceModifier = pageVariant ? pageVariant.price_modifier : 0;
            const unitPrice = basePrice + priceModifier;
            const variantDetails = pageVariant
                ? `${pageVariant.brand} ${pageVariant.model_name} ` + Object.entries(pageVariant.variant_attributes || {}).map(([k, v]) => `${k}: ${v}`).join(', ')
                : 'افتراضي';
            const cartItem = {
                product_id: pageProduct.id,
                variant_id: pageVariant ? pageVariant.id : null,
                product_name: pageProduct.title_ar,
                variant_details: variantDetails,
                unit_price: unitPrice,
                quantity: 1
            };
            const idx = cart.findIndex(ci => ci.product_id === cartItem.product_id && ci.variant_id === cartItem.variant_id);
            if (idx > -1) { cart[idx].quantity += 1; } else { cart.push(cartItem); }
            saveCart();
            renderCartModal();
            openModal('cartModal');
        }

        function copyProductLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                const btns = document.querySelectorAll('.copy-link-btn, .product-code-badge');
                btns.forEach(b => { b.style.background = '#16a34a'; });
                setTimeout(() => { btns.forEach(b => { b.style.background = ''; }); }, 1500);
            });
        }

        // Cart modal for product page
        function renderCartModal() {
            const list = document.getElementById('cartItemsList');
            const totalEl = document.getElementById('cartTotalPrice');
            if (!list || !totalEl) return;
            if (cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding:30px; color:var(--steel-grey);">السلة فارغة. أضف بعض المنتجات!</p>`;
                totalEl.innerText = formatSYP(0);
                openModal('cartModal');
                return;
            }
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                const it = item.unit_price * item.quantity;
                total += it;
                return `<div class="cart-item-row">
                    <div>
                        <strong style="display:block;">${item.product_name}</strong>
                        <span style="font-size:0.88rem; color:var(--steel-grey);">${item.variant_details}</span>
                        <div style="color:var(--damascus-green); font-weight:800; margin-top:4px;">${formatSYP(item.unit_price)} × ${item.quantity} = ${formatSYP(it)}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button onclick="pageChangeQty(${i},-1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border-color);background:#fff;cursor:pointer;">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="pageChangeQty(${i},1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border-color);background:#fff;cursor:pointer;">+</button>
                        <button onclick="pageRemove(${i})" style="color:var(--spark-red);background:none;border:none;cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }).join('');
            totalEl.innerText = formatSYP(total);
            openModal('cartModal');
        }

        function pageChangeQty(i, d) { if(cart[i]){cart[i].quantity+=d; if(cart[i].quantity<=0) cart.splice(i,1); saveCart(); renderCartModal();} }
        function pageRemove(i) { cart.splice(i,1); saveCart(); renderCartModal(); }

        // Load product on page ready
        loadProductPage();
    </script>
</body>
</html>
