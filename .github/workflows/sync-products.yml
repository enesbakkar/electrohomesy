name: Sync Products from Google Sheets

on:
  # Her 30 dakikada bir otomatik çalış
  schedule:
    - cron: '*/30 * * * *'
  # Admin panelinden ya da elle tetiklenebilsin
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run product sync script
        run: node scripts/sync-products.js

      - name: Commit and push if products.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/js/products.json js/products.json
          if git diff --staged --quiet; then
            echo "No changes to commit — products.json is already up to date."
          else
            git commit -m "chore: auto-sync products from Google Sheets [skip ci]"
            git push
          fi
