<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | إلكتروهومسي</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/electrohome_logo_blue_transparent.svg">
    <!-- Google Fonts Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- FontAwesome 6 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --damascus-green: #073066;
            --damascus-green-dark: #05234B;
            --spark-red: #CE1126;
            --onyx: #132730;
            --steel-grey: #64748B;
            --fog-bg: #F4F7F5;
            --white: #FFFFFF;
            --card-shadow: 0 20px 45px rgba(19, 39, 48, 0.08);
            --border-color: rgba(138, 154, 147, 0.22);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--fog-bg);
            color: var(--onyx);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .error-container {
            background: var(--white);
            max-width: 550px;
            width: 100%;
            padding: 45px 35px;
            border-radius: 28px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient light effect behind */
        .error-container::before {
            content: '';
            position: absolute;
            top: -150px;
            left: -150px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(7,48,102,0.08) 0%, rgba(255,255,255,0) 70%);
            z-index: 1;
        }

        .logo-img {
            height: 55px;
            margin-bottom: 30px;
            object-fit: contain;
            z-index: 2;
        }

        /* SVG Unplugged Animation / Illustration */
        .illustration-box {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 25px;
            z-index: 2;
        }

        .illustration-svg {
            width: 100%;
            height: 100%;
        }

        .bounce-anim {
            animation: bounce 3s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .error-code {
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--damascus-green) 0%, #00B4D8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -2px;
            z-index: 2;
        }

        .error-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--onyx);
            margin-bottom: 12px;
            z-index: 2;
        }

        .error-text {
            font-size: 1rem;
            color: var(--steel-grey);
            line-height: 1.8;
            margin-bottom: 30px;
            z-index: 2;
            max-width: 420px;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--damascus-green);
            color: var(--white);
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.15, 0.83, 0.66, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(7, 48, 102, 0.2);
            z-index: 2;
            width: 100%;
            max-width: 280px;
        }

        .home-btn:hover {
            background: var(--damascus-green-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(7, 48, 102, 0.3);
        }

        .home-btn:active {
            transform: translateY(0);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.82rem;
            color: var(--steel-grey);
            opacity: 0.8;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <!-- Logo -->
        <img src="/Logo/ElectroHomeSY-logo-blue.png" alt="ElectroHomeSY Logo" class="logo-img">
        
        <!-- Illustration -->
        <div class="illustration-box bounce-anim">
            <svg class="illustration-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer glow circle -->
                <circle cx="100" cy="100" r="80" fill="#F4F7F5" stroke="rgba(138, 154, 147, 0.15)" stroke-width="2"/>
                <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(7, 48, 102, 0.05)" stroke-width="4" stroke-dasharray="10 10"/>
                
                <!-- Plug Icon / Outlet Graphic -->
                <g transform="translate(50, 45)">
                    <!-- Wall Socket -->
                    <rect x="20" y="20" width="60" height="60" rx="12" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="2"/>
                    <circle cx="40" cy="50" r="6" fill="#64748B"/>
                    <circle cx="60" cy="50" r="6" fill="#64748B"/>
                    
                    <!-- Disconnected Wire & Plug -->
                    <path d="M 50 120 L 50 100 C 50 85, 95 85, 95 70 L 95 50" fill="none" stroke="#073066" stroke-width="4" stroke-linecap="round"/>
                    
                    <!-- Wire plug body -->
                    <rect x="85" y="40" width="20" height="15" rx="4" fill="#CE1126"/>
                    <!-- Plug prongs -->
                    <line x1="90" y1="40" x2="90" y2="32" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
                    <line x1="100" y1="40" x2="100" y2="32" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
                    
                    <!-- Warning / Exclamation -->
                    <path d="M 5 35 L 12 15 L 19 35 Z" fill="#CE1126" stroke="#CE1126" stroke-width="1"/>
                    <text x="9" y="32" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="sans-serif">!</text>
                </g>
            </svg>
        </div>

        <!-- 404 Text -->
        <h1 class="error-code">404</h1>
        <h2 class="error-title">الصفحة غير موجودة</h2>
        <p class="error-text">عذراً، يبدو أن الرابط الذي اتبعته غير صحيح، أو أن هذه الصفحة قد تم نقلها أو حذفها من موقع إلكتروهومسي.</p>
        
        <!-- Action Button -->
        <a href="/" class="home-btn">
            <i class="fa-solid fa-house"></i>
            العودة للرئيسية
        </a>

        <div class="footer-note">
            إلكتروهومسي ElectroHomeSY - دمشق، سوريا
        </div>
    </div>

</body>
</html>
